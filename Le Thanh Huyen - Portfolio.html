  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);

            let offset = 0;

    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.

      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from

      // the user to the entry page); plain #frag scrolls in place.

            'e.preventDefault();' +

              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +

            'else scrollTo({top:0, behavior:"smooth"});' +

    }

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        for (const a of old.attributes) s.setAttribute(a.name, a.value);

        // which transformScriptTags handles unconditionally.

          try {

            s.textContent = await r.text();

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }

    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

Space Grotesk\",sans-serif;\n  color:var(--cream);\n  -webkit-font-smoothing:antialiased;\n  cursor:none;\n}\nimg{display:block;width:100%;height:100%;object-fit:cover;}\n.mono{font-family:\"JetBrains Mono\",monospace;}\n.script{font-family:\"Pinyon Script\",cursive;font-weight:400;}\n\n/* ---------- Horizontal scroll viewport ---------- */\n#viewport{position:fixed;inset:0;overflow:hidden;}\n#track{display:flex;height:100%;will-change:transform;}\n.panel{\n  position:relative;flex:0 0 100vw;height:100vh;\n  overflow:hidden;background:var(--bg);\n  padding: calc(var(--u)*11) calc(var(--u)*6) calc(var(--u)*9);\n  display:flex;flex-direction:column;\n}\n.panel__inner{position:relative;flex:1;min-height:0;width:100%;}\n\n/* layers move at different rates for depth (set via JS using --shift) */\n.depth{will-change:transform;}\n\n/* ---------- Global chrome ---------- */\n.chrome{position:fixed;left:0;right:0;z-index:60;pointer-events:none;transition:opacity .55s var(--ease);}\n.chrome *{pointer-events:auto;}\nbody.on-gallery .topbar,body.on-gallery .botbar,body.on-gallery .next-arrow{opacity:0;pointer-events:none;}\n.topbar{\n  top:calc(var(--u)*4);margin:0 calc(var(--u)*6);\n  display:flex;align-items:center;justify-content:space-between;\n  border:1px solid var(--line);border-radius:6px;\n  padding:calc(var(--u)*1.7) calc(var(--u)*3);\n  background:rgba(0,0,0,.35);backdrop-filter:blur(6px);\n}\n.brandmark{font-family:\"JetBrains Mono\",monospace;letter-spacing:.12em;font-size:clamp(11px,1.45vh,18px);color:var(--cream);}\n.nav{display:flex;gap:calc(var(--u)*4);font-weight:500;font-size:clamp(11px,1.5vh,18px);letter-spacing:.04em;}\n.nav a{color:var(--cream);text-decoration:none;position:relative;opacity:.78;transition:opacity .3s,color .3s;white-space:nowrap;}\n.nav a.active{opacity:1;font-weight:700;}\n.nav a:hover{opacity:1;color:var(--lime);}\n.nav a::after{content:\"\";position:absolute;left:0;right:100%;bottom:-5px;height:2px;background:var(--lime);transition:right .35s var(--ease);}\n.nav a:hover::after{right:0;}\n\n.botbar{bottom:calc(var(--u)*3.5);display:flex;align-items:center;justify-content:center;}\n.pagepill{\n  border:1px solid var(--line);border-radius:999px;\n  padding:calc(var(--u)*1.1) calc(var(--u)*3.2);\n  font-family:\"JetBrains Mono\",monospace;letter-spacing:.18em;\n  font-size:clamp(11px,1.45vh,16px);color:var(--lime-soft);\n  background:rgba(0,0,0,.4);\n  display:flex;gap:.55em;overflow:hidden;\n}\n.pagepill b{font-weight:700;}\n.next-arrow{\n  position:fixed;right:calc(var(--u)*6);bottom:calc(var(--u)*4);z-index:60;\n  width:calc(var(--u)*7);height:calc(var(--u)*7);min-width:46px;min-height:46px;\n  display:grid;place-items:center;color:var(--white);\n  background:transparent;border:0;padding:0;cursor:none;\n  transition:transform .4s var(--ease);\n}\n.next-arrow svg{width:62%;height:62%;}\n.next-arrow{transition:transform .4s var(--ease),opacity .55s var(--ease);}\n.next-arrow:hover{transform:translateX(8px) scale(1.08);color:var(--lime);}\n\n/* corner glow + zigzag, fixed behind panels */\n.decor{position:fixed;inset:0;z-index:0;pointer-events:none;}\n.glow{position:absolute;width:34vw;height:60vh;border-radius:50%;filter:blur(70px);background:radial-gradient(circle,var(--glow),transparent 68%);opacity:.85;}\n.glow.bl{left:-12vw;bottom:-18vh;}\n.glow.br{right:-12vw;bottom:-14vh;}\n.glow.tr{right:-10vw;top:-16vh;opacity:.5;}\n\n/* ---------- decorative bits ---------- */\n.sun{display:block;color:var(--lime);}\n.spark{display:block;color:var(--lime);}\n.zig{position:absolute;color:var(--line-dim);}\n.sun svg,.spark svg,.citem .ar svg{width:100%;height:100%;display:block;}\n\n/* ---------- reveal system ---------- */\n[data-reveal]{opacity:0;transform:translateY(46px);transition:opacity .9s var(--ease),transform .9s var(--ease);transition-delay:var(--d,0s);}\n[data-reveal=\"left\"]{transform:translateX(-60px);}\n[data-reveal=\"right\"]{transform:translateX(60px);}\n[data-reveal=\"scale\"]{transform:scale(.86);}\n[data-reveal=\"clip\"]{clip-path:inset(0 100% 0 0);opacity:1;transition:clip-path 1s var(--ease);transition-delay:var(--d,0s);}\n[data-reveal=\"rise\"]{transform:translateY(110%);}\n.panel.is-active [data-reveal]{opacity:1;transform:none;clip-path:inset(0 0 0 0);}\n@media (prefers-reduced-motion:reduce){\n  [data-reveal]{opacity:1!important;transform:none!important;clip-path:none!important;transition:none!important;}\n}\n\n/* line-by-line mask reveal for big headings */\n.maskline{display:block;overflow:hidden;}\n.maskline.script-line{padding:.18em 0;}\n.maskline > span{display:block;transform:translateY(130%);transition:transform 1s var(--ease);transition-delay:var(--d,0s);}\n.panel.is-active .maskline > span{transform:translateY(0);}\n\n/* ---------- custom cursor ---------- */\n#cursor{position:fixed;top:0;left:0;z-index:200;pointer-events:none;mix-blend-mode:difference;}\n#cur-ring{position:fixed;top:0;left:0;width:46px;height:46px;border:1.5px solid #fff;border-radius:50%;\n  transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease),background .3s,opacity .3s;z-index:200;pointer-events:none;mix-blend-mode:difference;}\n#cur-dot{position:fixed;top:0;left:0;width:6px;height:6px;background:#fff;border-radius:50%;transform:translate(-50%,-50%);z-index:201;pointer-events:none;mix-blend-mode:difference;}\n#cur-ring.hot{width:74px;height:74px;background:#fff;}\n#cur-ring.drag{width:90px;height:90px;}\n#cur-ring .label{position:absolute;inset:0;display:grid;place-items:center;font-family:\"JetBrains Mono\",monospace;font-size:9px;letter-spacing:.1em;color:#000;opacity:0;transition:opacity .3s;mix-blend-mode:normal;}\n#cur-ring.drag .label{opacity:1;}\nbody.touch #cursor,body.touch #cur-ring,body.touch #cur-dot{display:none!important;}\n\n/* ---------- intro loader ---------- */\n#intro{position:fixed;inset:0;z-index:300;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;}\n#intro .ititle{font-weight:700;letter-spacing:-.02em;line-height:.9;color:var(--cream);font-size:clamp(48px,12vw,200px);overflow:hidden;}\n#intro .ititle span{display:inline-block;transform:translateY(110%);}\n#intro .isub{font-family:\"Pinyon Script\",cursive;color:var(--lime-soft);font-size:clamp(28px,6vw,84px);margin-top:-.2em;opacity:0;}\n#intro .icount{position:absolute;right:calc(var(--u)*6);bottom:calc(var(--u)*5);font-family:\"JetBrains Mono\",monospace;font-size:clamp(40px,9vw,120px);color:var(--lime);font-weight:700;}\n#intro .ibar{position:absolute;left:calc(var(--u)*6);right:calc(var(--u)*6);bottom:calc(var(--u)*4);height:2px;background:rgba(255,255,255,.15);overflow:hidden;}\n#intro .ibar i{display:block;height:100%;width:0;background:var(--lime);}\n.intro-done #intro{display:none;}\n\n/* split intro panels for curtain wipe */\n#curtain{position:fixed;inset:0;z-index:290;pointer-events:none;display:flex;}\n#curtain div{flex:1;background:var(--bg);transform-origin:top;}\n\n/* ===========================================================\n   PANEL TYPOGRAPHY HELPERS\n   =========================================================== */\n.kicker{font-family:\"JetBrains Mono\",monospace;letter-spacing:.22em;font-size:clamp(11px,1.5vh,15px);color:var(--lime);text-transform:uppercase;}\n.h-display{font-weight:700;line-height:.92;letter-spacing:-.02em;color:var(--cream);}\n.body{font-family:\"JetBrains Mono\",monospace;line-height:1.7;color:var(--muted);font-size:clamp(12px,1.7vh,17px);}\n.lime{color:var(--lime);}\n\n/* frame for photos */\n.frame{position:relative;overflow:hidden;background:#111;}\n.frame::after{content:\"\";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);}\n\n/* ===========================================================\n   P1 HERO\n   =========================================================== */\n.hero{display:grid;grid-template-columns:repeat(3,1fr);gap:0;height:100%;align-items:stretch;}\n.hero .slot{position:relative;overflow:hidden;}\n.cover-img{width:100%;height:100%;object-fit:cover;display:block;}\n.hero .frame{border-radius:0;}\n.hero .frame::after{display:none;}\n.hero__overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;pointer-events:none;}\n.hero__overlay::before,.thanks__overlay::before{content:\"\";position:absolute;inset:0;background:radial-gradient(ellipse 72% 62% at 50% 50%,rgba(0,0,0,.82),rgba(0,0,0,.5) 56%,rgba(0,0,0,.12) 84%);pointer-events:none;}\n.hero__word,.hero__script,.thanks__word,.thanks__script{position:relative;text-shadow:0 6px 50px rgba(0,0,0,.65);}\n.hero__word{font-weight:700;color:var(--cream);font-size:clamp(60px,14.5vw,260px);line-height:.8;letter-spacing:-.01em;}\n.hero__script{font-family:\"Pinyon Script\",cursive;color:var(--cream);font-size:clamp(26px,4.6vw,82px);line-height:1.12;margin-top:-.06em;white-space:nowrap;text-shadow:0 2px 30px rgba(0,0,0,.5);}\n\n/* generic centered-title panel */\n.center-title{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;}\n\n/* ===========================================================\n   P2 ABOUT\n   =========================================================== */\n.about{display:grid;grid-template-columns:0.92fr 1fr 1.5fr;grid-template-rows:auto minmax(0,1fr) auto;gap:calc(var(--u)*3.5) calc(var(--u)*4.5);height:100%;}\n.about__title{grid-column:1/4;grid-row:1;font-size:clamp(38px,7.2vh,86px);line-height:1.06;padding-bottom:.16em;align-self:start;}\n.about__photo{grid-column:1;grid-row:2/4;position:relative;}\n.about__photo .frame{position:absolute;inset:0 0 0 calc(var(--u)*-6);border-radius:0;}\n.about__media{grid-column:2/4;grid-row:2;display:grid;grid-template-columns:2.1fr 1fr;gap:calc(var(--u)*2.6);min-height:0;}\n.about__exp{grid-column:2/4;grid-row:3;align-self:start;max-width:60ch;}\n.about__exp .body{font-size:clamp(15px,2.15vh,21px);line-height:1.78;}\n\n/* ===========================================================\n   P3 EXPERIENCE\n   =========================================================== */\n.exp{display:flex;flex-direction:column;height:100%;}\n.exp__banner{position:relative;height:20%;margin:calc(var(--u)*1) calc(var(--u)*-1) 0;overflow:hidden;}\n.exp__banner .bcap{position:absolute;inset:0;display:flex;align-items:center;padding:0 calc(var(--u)*5);background:linear-gradient(90deg,rgba(0,0,0,.82),rgba(0,0,0,.55) 45%,rgba(0,0,0,.15));z-index:4;}\n.exp__banner .bcap p{max-width:62%;font-family:\"JetBrains Mono\",monospace;line-height:1.62;color:var(--cream);font-size:clamp(15px,2.5vh,24px);}\n.exp__title{position:relative;z-index:3;font-size:clamp(36px,7vh,84px);line-height:1.05;padding-bottom:.08em;margin:0;}\n.exp__cards{display:grid;grid-template-columns:repeat(3,1fr);gap:calc(var(--u)*3);flex:1;margin-top:calc(var(--u)*2.6);min-height:0;}\n.expcard{border:1px solid var(--line-dim);padding:calc(var(--u)*3) calc(var(--u)*3);display:flex;flex-direction:column;gap:calc(var(--u)*1.6);justify-content:flex-start;min-height:0;}\n.expcard .cnum{font-family:\"JetBrains Mono\",monospace;color:var(--lime);font-size:clamp(13px,1.8vh,17px);letter-spacing:.12em;}\n.expcard h4{color:var(--cream);font-weight:700;font-size:clamp(18px,2.75vh,29px);line-height:1.12;}\n.sklist{list-style:none;display:flex;flex-direction:column;gap:.5em;margin-top:.4em;}\n.sklist li{position:relative;padding-left:1.2em;font-family:\"JetBrains Mono\",monospace;font-size:clamp(14px,2.05vh,21px);color:var(--muted);line-height:1.5;}\n.sklist li::before{content:\"\";position:absolute;left:0;top:.62em;width:.48em;height:.48em;background:var(--lime);}\n\n/* ===========================================================\n   P4 STYLE & FOCUS\n   =========================================================== */\n.sf{display:flex;flex-direction:column;height:100%;align-items:center;gap:calc(var(--u)*3);}\n.sf__cols{display:grid;grid-template-columns:repeat(4,1fr);gap:calc(var(--u)*2.6);width:100%;flex:1;min-height:0;}\n.sfcol{display:flex;flex-direction:column;gap:calc(var(--u)*1.6);min-height:0;}\n.sfcol .cap{border:1px solid var(--line-dim);padding:calc(var(--u)*1.8) calc(var(--u)*2);}\n.sfcol .cap h4{color:var(--lime);font-weight:700;font-size:clamp(15px,2.3vh,22px);}\n.sfcol .cap p{color:var(--cream);font-size:clamp(12px,1.7vh,16px);}\n.sfcol .frame{flex:1;}\n.sf__foot{max-width:62%;text-align:center;}\n.sfcol .cap .ex{display:block;margin-top:.5em;color:var(--muted);font-size:clamp(11px,1.45vh,14px);line-height:1.4;}\n\n/* full-bleed quote / section divider over gallery */\n.gquote{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;justify-content:center;padding:0 9vw;pointer-events:none;}\n.gquote::before{content:\"\";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.85),rgba(0,0,0,.5) 55%,rgba(0,0,0,.25));z-index:-1;}\n.gquote .qk{font-family:\"JetBrains Mono\",monospace;letter-spacing:.22em;text-transform:uppercase;color:var(--lime);font-size:clamp(11px,1.6vh,16px);margin-bottom:calc(var(--u)*2.5);}\n.gquote h2{font-weight:700;color:var(--cream);line-height:1.02;letter-spacing:-.02em;font-size:clamp(30px,6.6vh,86px);max-width:18ch;}\n.gquote p{font-family:\"JetBrains Mono\",monospace;color:var(--muted);line-height:1.7;font-size:clamp(13px,1.9vh,19px);max-width:46ch;margin-top:calc(var(--u)*3.5);}\n\n/* ===========================================================\n   P5 GALLERY\n   =========================================================== */\n.gallery-panel{padding:0;}\n.gallery-panel .full{position:absolute;inset:0;}\n.gallery-panel img{object-fit:cover;}\n\n/* ===========================================================\n   P6 PROCESS\n   =========================================================== */\n.proc{position:relative;height:100%;display:flex;flex-direction:column;justify-content:center;}\n.proc__bg{position:absolute;left:calc(var(--u)*-6);right:calc(var(--u)*-6);top:calc(var(--u)*-11);height:62%;}\n.proc__bg::after{content:\"\";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25),#000 88%);}\n.proc__title{position:relative;z-index:3;font-size:clamp(40px,8.4vh,104px);margin-bottom:calc(var(--u)*4);}\n.proc__row{position:relative;z-index:3;display:flex;justify-content:space-between;align-items:center;gap:calc(var(--u)*1);}\n.pcircle{width:min(20vw,24vh);aspect-ratio:1;border-radius:50%;border:1px solid var(--line-dim);background:rgba(0,0,0,.55);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:.2em;flex:0 0 auto;}\n.pcircle .num{font-weight:700;font-size:clamp(30px,6vh,68px);color:var(--lime);line-height:1;}\n.pcircle h4{font-weight:700;font-size:clamp(13px,1.9vh,20px);color:var(--white);}\n.pcircle p{font-family:\"JetBrains Mono\",monospace;font-size:clamp(10px,1.4vh,13px);color:var(--muted);}\n.pcircle.down{position:relative;top:30%;}\n.connector{flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--line-dim) 0 8px,transparent 8px 16px);}\n\n/* ===========================================================\n   P7 / P8 PROJECT\n   =========================================================== */\n.proj{display:grid;gap:calc(var(--u)*4);height:100%;align-items:center;}\n.proj.p-left{grid-template-columns:0.9fr 0.9fr 1.4fr;}\n.proj.p-right{grid-template-columns:1.4fr 0.9fr 0.9fr;}\n.proj .stack{display:grid;grid-template-rows:1fr 1fr;gap:calc(var(--u)*3);height:82%;}\n.proj .tall{height:82%;}\n.proj__info{border:1px solid var(--line-dim);padding:calc(var(--u)*4.5);display:flex;flex-direction:column;gap:calc(var(--u)*2.4);height:82%;justify-content:center;}\n.proj__info h3{font-weight:700;font-size:clamp(40px,8.5vh,104px);color:var(--cream);line-height:.9;margin-bottom:calc(var(--u)*1);}\n.proj__info .lab{color:var(--lime);font-weight:700;font-size:clamp(15px,2.3vh,22px);}\n.proj__info .val{color:var(--cream);font-family:\"JetBrains Mono\",monospace;font-size:clamp(12px,1.7vh,16px);padding-left:calc(var(--u)*3);}\n\n/* ===========================================================\n   P9 WORKSPACE\n   =========================================================== */\n.ws{display:grid;grid-template-columns:1.25fr 1fr 1fr 1fr;grid-template-rows:auto 1fr;gap:calc(var(--u)*2.6);height:100%;}\n.ws .big{grid-row:1/3;}\n.ws .small{height:32vh;max-height:34%;}\n.ws__txt{grid-column:2/5;border:1px solid var(--line-dim);padding:calc(var(--u)*4);display:flex;flex-direction:column;justify-content:center;gap:calc(var(--u)*2.4);}\n.ws__txt h3{font-weight:700;font-size:clamp(40px,8.6vh,104px);color:var(--cream);line-height:.9;}\n\n/* ===========================================================\n   P10 BRAND COLLAB\n   =========================================================== */\n.brand{display:flex;flex-direction:column;height:100%;gap:calc(var(--u)*4);align-items:center;}\n.brand__row{display:grid;grid-template-columns:repeat(3,1fr);gap:calc(var(--u)*3);width:100%;height:34%;}\n.brand__title{font-weight:700;font-size:clamp(34px,6.4vh,86px);color:var(--cream);line-height:.95;text-align:center;text-wrap:balance;}\n.brand__copy{max-width:74%;text-align:center;display:flex;flex-direction:column;gap:calc(var(--u)*2);}\n.brand__copy .sklist{text-align:left;}\n.brand__copy .sklist li{font-size:clamp(13px,1.85vh,18px);padding-left:1.3em;break-inside:avoid;margin-bottom:.55em;}\n.brand__copy .sklist li::before{top:.5em;width:.5em;height:.5em;}\n\n/* ===========================================================\n   P11 CONTACT\n   =========================================================== */\n.contact{display:grid;grid-template-columns:0.9fr 1.35fr;gap:calc(var(--u)*6);height:100%;align-items:center;position:relative;}\n.contact__list{display:flex;flex-direction:column;gap:calc(var(--u)*4.2);}\n.citem{display:grid;grid-template-columns:auto 1fr;column-gap:calc(var(--u)*2);align-items:start;}\n.citem .ar{color:var(--lime);grid-row:1/3;}\n.citem h4{font-weight:700;font-size:clamp(18px,2.6vh,26px);color:var(--white);}\n.citem p{font-family:\"JetBrains Mono\",monospace;color:var(--muted);font-size:clamp(13px,1.8vh,17px);margin-top:.3em;word-break:break-word;}\n.contact__right{position:relative;display:flex;align-items:center;}\n.contact__photo{position:absolute;right:0;width:64%;aspect-ratio:1/1.05;}\n.contact__head{position:relative;z-index:4;font-weight:700;font-size:clamp(48px,9vh,118px);color:var(--white);line-height:.9;}\n\n/* ===========================================================\n   P12 THANK YOU\n   =========================================================== */\n.thanks{display:grid;grid-template-columns:repeat(3,1fr);gap:0;height:100%;}\n.thanks .frame{border-radius:0;}\n.thanks .frame::after{display:none;}\n.thanks__overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:5;pointer-events:none;}\n.thanks__word{font-weight:700;color:var(--cream);font-size:clamp(44px,9vw,150px);line-height:.98;}\n.thanks__script{font-family:\"Pinyon Script\",cursive;color:var(--cream);font-size:clamp(32px,6.5vw,112px);line-height:1.1;margin-top:-.04em;}\n.ty__note{position:relative;z-index:6;margin-top:calc(var(--u)*2.5);max-width:42ch;text-align:center;font-family:\"JetBrains Mono\",monospace;font-size:clamp(12px,1.7vh,17px);color:var(--cream);line-height:1.6;text-shadow:0 2px 16px rgba(0,0,0,.8);}\n\n/* ===========================================================\n   IMAGE-SLOT theming (dark/lime)\n   =========================================================== */\nimage-slot{display:block;}\n.slot{width:100%;height:100%;}\nimage-slot::part(frame){background:rgba(255,255,255,.035);}\nimage-slot::part(ring){border-color:rgba(216,242,76,.4);border-width:1.4px;}\nimage-slot::part(empty){color:rgba(244,239,227,.62);font-family:\"JetBrains Mono\",monospace;}\n\n/* ===========================================================\n   P3 SKILLS INTRO\n   =========================================================== */\n.skintro{display:grid;grid-template-columns:1.05fr 1fr;gap:calc(var(--u)*6);height:100%;align-items:center;}\n.skintro__left{display:flex;flex-direction:column;gap:calc(var(--u)*3.5);}\n.skintro__left h2{font-size:clamp(40px,8.2vh,104px);line-height:1.0;}\n.skintro__left p{font-family:\"JetBrains Mono\",monospace;color:var(--muted);font-size:clamp(14px,2.1vh,21px);line-height:1.7;max-width:40ch;}\n.skmenu{display:flex;flex-direction:column;}\n.skmenu .row{display:grid;grid-template-columns:auto 1fr;gap:calc(var(--u)*3);align-items:center;padding:calc(var(--u)*2.6) 0;border-top:1px solid var(--line-dim);}\n.skmenu .row:last-child{border-bottom:1px solid var(--line-dim);}\n.skmenu .rn{font-family:\"JetBrains Mono\",monospace;color:var(--lime);font-size:clamp(14px,2vh,19px);letter-spacing:.1em;}\n.skmenu .rt{font-weight:700;color:var(--cream);font-size:clamp(16px,2.5vh,27px);line-height:1.12;text-wrap:balance;}\n\n/* ===========================================================\n   P4 SKILLS DETAIL (4 cards)\n   =========================================================== */\n.skill4{display:flex;flex-direction:column;height:100%;gap:calc(var(--u)*3.5);}\n.skill4 > h2{font-size:clamp(36px,7vh,88px);}\n.skill4__grid{display:grid;grid-template-columns:repeat(4,1fr);gap:calc(var(--u)*2.6);flex:1;min-height:0;}\n.skill4__grid .expcard{justify-content:flex-start;}\n\n/* ===========================================================\n   GALLERIES (bài viết / ảnh / ấn phẩm)\n   =========================================================== */\n.gal{display:flex;flex-direction:column;height:100%;gap:calc(var(--u)*3);}\n.gal__head{display:flex;align-items:flex-end;justify-content:space-between;gap:calc(var(--u)*5);}\n.gal__head h2{font-size:clamp(34px,7vh,90px);line-height:.98;}\n.gal__head p{font-family:\"JetBrains Mono\",monospace;color:var(--muted);max-width:44ch;font-size:clamp(13px,1.85vh,18px);line-height:1.6;text-align:right;}\n.gal__grid{display:grid;flex:1;gap:calc(var(--u)*2.4);min-height:0;}\n.g-articles{grid-template-columns:repeat(4,1fr);}\n.g-events{grid-template-columns:repeat(4,1fr);grid-template-rows:1fr 1fr;}\n.g-events .big{grid-row:1/3;}\n.g-prints{grid-template-columns:repeat(4,1fr);}\n\n/* ===========================================================\n   P8 VIDEO\n   =========================================================== */\n.vidwrap{display:flex;flex-direction:column;height:100%;gap:calc(var(--u)*3.2);}\n.vidwrap > h2{font-size:clamp(34px,7vh,90px);}\n.vidgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:calc(var(--u)*3.2) calc(var(--u)*3.4);flex:1;min-height:0;}\n.vidcard{display:flex;flex-direction:column;gap:calc(var(--u)*1.5);min-height:0;}\n.vthumb{position:relative;flex:1;min-height:0;}\n.vthumb .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:clamp(42px,6vh,64px);height:clamp(42px,6vh,64px);border-radius:50%;background:rgba(0,0,0,.5);border:1.5px solid var(--lime);display:grid;place-items:center;z-index:3;pointer-events:none;}\n.vthumb .play::after{content:\"\";display:block;width:0;height:0;border-style:solid;border-width:7px 0 7px 12px;border-color:transparent transparent transparent var(--lime);margin-left:3px;}\n.vidcard .vmeta{display:flex;align-items:baseline;justify-content:space-between;gap:1em;}\n.vidcard h4{color:var(--cream);font-weight:700;font-size:clamp(15px,2.15vh,21px);line-height:1.15;}\n.vidcard a{font-family:\"JetBrains Mono\",monospace;color:var(--lime);font-size:clamp(11px,1.5vh,14px);text-decoration:none;white-space:nowrap;letter-spacing:.06em;}\n.vidcard a:hover{text-decoration:underline;}\n\n/* ===========================================================\n   CASE STUDIES (Wedding / Sự kiện / Truyền thông)\n   =========================================================== */\n.case{display:grid;grid-template-columns:1.15fr 1fr;gap:calc(var(--u)*5.5);height:100%;align-items:center;}\n.case.flip .case__media{order:2;}\n.case__ TFOLIO<\u002Fspan><\u002Fh1>\n      <div class=\"hero__script maskline script-line\" style=\"font-size:clamp(26px,4.8vw,76px)\"><span style=\"--d:.72s\">Lê Thanh Huyền<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== P2 — XIN CHÀO ===== -->\n  <section class=\"panel\" data-screen-label=\"02\">\n   <div class=\"panel__inner\">\n    <div class=\"about\">\n      <h2 class=\"about__title h-display\" data-reveal=\"\" style=\"--d:.05s\">Xin chào, mình là Huyền<\u002Fh2>\n      <div class=\"about__photo\">\n        <image-slot class=\"slot\" id=\"about-portrait\" shape=\"rect\" placeholder=\"Ảnh chân dung\" data-reveal=\"left\" style=\"--d:.15s\"><\u002Fimage-slot>\n        <span class=\"sun\" style=\"position:absolute;bottom:-4vh;right:-3vh;width:13vh;height:13vh;z-index:6;--d:.5s\" data-reveal=\"scale\"><svg><use href=\"#sun\"><\u002Fuse><\u002Fsvg><\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"about__media\">\n        <image-slot class=\"slot\" id=\"about-2\" shape=\"rect\" placeholder=\"Ảnh sự kiện\" data-reveal=\"scale\" style=\"--d:.2s\"><\u002Fimage-slot>\n        <image-slot class=\"slot\" id=\"about-3\" shape=\"rect\" placeholder=\"Ảnh\" data-reveal=\"scale\" style=\"--d:.3s\"><\u002Fimage-slot>\n      <\u002Fdiv>\n      <div class=\"about__exp\" data-reveal=\"\" style=\"--d:.42s\">\n        <p class=\"body\">Xin chào, mình là Huyền – một người yêu thích sáng tạo, kết nối con người và tạo ra những trải nghiệm đáng nhớ thông qua các sự kiện. Với kinh nghiệm trong lĩnh vực truyền thông nội bộ và tổ chức sự kiện doanh nghiệp, mình luôn mong muốn biến những ý tưởng thành những chương trình mang lại giá trị thực tế và cảm xúc tích cực cho người tham gia.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== P3 — KỸ NĂNG (intro) ===== -->\n  <section class=\"panel\" data-screen-label=\"03\">\n   <div class=\"panel__inner\">\n    <span class=\"sun\" style=\"position:absolute;top:30%;
